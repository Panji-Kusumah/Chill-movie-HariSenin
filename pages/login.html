<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Chill - Masuk</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body class="bg-masuk">
    <div class="auth-card">
        <div class="logo-container">
            <img src="../assets/icons/logo.png" alt="Chill" class="logo-img" style="width: 100px; height: 50px;">
        </div>
        <h2 class="auth-title">Masuk</h2>
        <p class="auth-subtitle">Selamat datang kembali!</p>

        <form>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Masukkan username" required>
            </div>
            <div class="input-group">
                <label>Kata Sandi</label>
                <div class="password-field">
                    <input type="password" placeholder="Masukkan kata sandi" required>
                    <img src="../assets/icons/eye-off.png" class="icon-eye">
                </div>
            </div>

            <div class="auth-helper">
                <span>Belum punya akun? <a href="register.html">Daftar</a></span>
                <a href="#" style="font-weight: normal; color: #b3b3b3;">Lupa kata sandi?</a>
            </div>

            <button type="submit" class="btn-primary">Masuk</button>
            <div class="divider">Atau</div>
            <button type="button" class="btn-google">
                <img src="../assets/icons/google.png" alt="Google"> Masuk dengan Google
            </button>
        </form>
    </div>
</body>

</html>
