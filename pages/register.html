<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Chill - Daftar</title>
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="bg-daftar">

<div class="auth-card">

    <div class="logo-container">
        <img src="../assets/icons/logo.png" alt="Chill" class="logo-img" style="width: 100px; height: 50px;">        
    </div>

    <h2 class="auth-title">Daftar</h2>
    <p class="auth-subtitle">Selamat datang!</p>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Masukkan username">
        </div>

        <div class="input-group">
            <label>Kata Sandi</label>
            <div class="password-field">
                <input type="password" placeholder="Masukkan kata sandi">
                <img src="../assets/icons/eye-off.png" class="icon-eye">
            </div>
        </div>

        <div class="input-group">
            <label>Konfirmasi Kata Sandi</label>
            <div class="password-field">
                <input type="password" placeholder="Masukkan kata sandi">
                <img src="../assets/icons/eye-off.png" class="icon-eye">
            </div>
        </div>

        <div class="auth-helper">
            <span>Sudah punya akun? <a href="login.html">Masuk</a></span>
        </div>

        <button class="btn-primary">Daftar</button>

        <div class="divider">Atau</div>

        <button type="button" class="btn-google">
            <img src="../assets/icons/google.png">
            Daftar dengan Google
        </button>
    </form>

</div>

</body>
</html>
